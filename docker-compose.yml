services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://ctfm:ctfm_secret@db:5432/cantheyfuckme
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cantheyfuckme
      - POSTGRES_USER=ctfm
      - POSTGRES_PASSWORD=ctfm_secret
    volumes:
      - ctfm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctfm -d cantheyfuckme"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ctfm_pgdata:
